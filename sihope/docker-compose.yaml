services:
  # ============================================================
  # Base de datos MySQL
  # ============================================================
  mysql:
    image: mysql:8.0
    ports:
      - 13306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=library
      - MYSQL_USER=user
      - MYSQL_PASSWORD=library2026
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Backend Spring Boot (API REST)
  # ============================================================
  app:
    build: .
    ports:
      - 8080:8080
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # La app se conecta a MySQL por el nombre del servicio y el puerto interno (3306).
      - DB_URL=jdbc:mysql://mysql:3306/library
      - DB_USERNAME=user
      - DB_PASSWORD=library2026
      # Orígenes permitidos por CORS: dev (Vite) y el dominio del frontend en Vercel.
      # Sobreescribe con tu URL real de Vercel (separa varias por comas, sin espacios).
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      # Correo (API de Gmail). Si GMAIL_REFRESH_TOKEN queda vacío, se usa el modo simulado (log).
      - APP_FRONTEND_BASE_URL=${APP_FRONTEND_BASE_URL:-http://localhost:5173}
      - MAIL_FROM=${MAIL_FROM:-}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN:-}

volumes:
  mysql_data:
