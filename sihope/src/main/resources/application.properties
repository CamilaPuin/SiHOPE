spring.application.name=libraryapp

# ============================================================
# Conexión a la base de datos MySQL (contenedor Docker)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:13306/library}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:library2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Configuración JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# Inicialización del esquema con schema-mysql.sql
# ============================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.jpa.defer-datasource-initialization=true

# ============================================================
# CORS: orígenes del frontend React (Vite en dev, Vercel en prod)
# Lista separada por comas; se puede sobreescribir con APP_CORS_ALLOWED_ORIGINS
# ============================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ============================================================
# Autenticación JWT (jjwt)
#   - app.jwt.secret: clave HMAC-SHA256 (mínimo 32 bytes). Definir JWT_SECRET en prod.
#   - app.jwt.expiration-ms: vigencia del token (por defecto 24 h).
# ============================================================
app.jwt.secret=${JWT_SECRET:sihope-dev-secret-cambia-esto-en-produccion-min-32-bytes-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# Correo (API de Gmail vía OAuth2)
#   - app.frontend.base-url: dominio del frontend al que apuntan los enlaces de
#     verificación (/verificar) y recuperación (/restablecer) de los correos.
#   - app.mail.from: remitente; DEBE ser la misma cuenta Gmail que autorizó el
#     refresh token.
#   - app.mail.gmail.*: credenciales OAuth2 de la API de Gmail. Si refresh-token
#     está vacío, EmailService cae al modo simulado (los correos se escriben en el log).
# ============================================================
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.mail.from=${MAIL_FROM:}
app.mail.gmail.client-id=${GMAIL_CLIENT_ID:}
app.mail.gmail.client-secret=${GMAIL_CLIENT_SECRET:}
app.mail.gmail.refresh-token=${GMAIL_REFRESH_TOKEN:}

# ============================================================
# springdoc-openapi (Swagger UI en /swagger-ui.html)
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html

# Habilitar logging en desarrollo para diagnosticar errores
logging.level.root=DEBUG

# Puerto del backend; coincide con VITE_API_URL del frontend y con docker-compose.
server.port=8080
