spring.application.name=sihopeapp
# Carga secretos locales si el archivo existe (dev). Se prueban ambas rutas
# porque el working dir cambia: ./sihope si arrancas desde el IDE (raiz del repo),
# ./ si arrancas con `cd sihope && ./mvnw`. En Railway no existe y se ignora.
spring.config.import=optional:file:./secrets-local.properties,optional:file:./sihope/secrets-local.properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:13306/sihope?useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:sihope2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://si-hope.vercel.app}
app.jwt.secret=${JWT_SECRET:sihope-dev-secret-cambia-esto-en-produccion-min-32-bytes-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.mail.from=${MAIL_FROM:}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:}
springdoc.swagger-ui.path=/swagger-ui.html
logging.level.root=INFO
server.port=${PORT:8080}