spring.application.name=libraryapp
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:13306/library}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:library2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.jpa.defer-datasource-initialization=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://si-hope.vercel.app}
app.jwt.secret=${JWT_SECRET:sihope-dev-secret-cambia-esto-en-produccion-min-32-bytes-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.mail.from=${MAIL_FROM:}
app.mail.gmail.client-id=${GMAIL_CLIENT_ID:}
app.mail.gmail.client-secret=${GMAIL_CLIENT_SECRET:}
app.mail.gmail.refresh-token=${GMAIL_REFRESH_TOKEN:}
springdoc.swagger-ui.path=/swagger-ui.html
logging.level.root=INFO
server.port=${PORT:8080}