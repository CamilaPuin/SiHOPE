spring.application.name=libraryapp

# ============================================================
# Conexión a la base de datos MySQL (contenedor Docker)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:13306/library}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:library2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Configuración JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# Inicialización del esquema con schema-mysql.sql
# ============================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.jpa.defer-datasource-initialization=true

# ============================================================
# CORS: orígenes del frontend React (Vite en dev, Vercel en prod)
# Lista separada por comas; se puede sobreescribir con APP_CORS_ALLOWED_ORIGINS
# ============================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Habilitar logging en desarrollo para diagnosticar errores
logging.level.root=DEBUG

# Usar puerto alternativo cuando 8080 esté ocupado en la máquina local
server.port=8081
